# Dataset registry — maps dataset names to data/adj paths.
# Paths are relative to the data base directory (platform-specific).
# Node count is read from info.json at load time.

# ── Flow Prediction: N → N ────────────────────────────────────────────
nyc_manhattan_15min:
  data: nyc_manhattan_15min
  adj: nyc_manhattan_15min/Manhattan.npy

chicago_15min:
  data: chicago_15min
  adj: chicago_15min/chicago.npy

dc_60min:
  data: dc_60min
  adj: dc_60min/dc.npy

sf_15min:
  data: sf_15min
  adj: sf_15min/sf.npy


# ── OD Prediction: N*N → N*N ────────────────────────────────────────────
nyc_manhattan_od_15min:
  data: nyc_manhattan_od_15min
  adj: nyc_manhattan_od_15min/manhattan.npy

chicago_od_15min:
  data: chicago_od_15min
  adj: chicago_od_15min/chicago.npy

dc_od_60min:
  data: dc_od_60min
  adj: dc_od_60min/dc.npy

sf_od_15min:
  data: sf_od_15min
  adj: sf_od_15min/sf.npy
